<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Today's Schedule | Daily Notes Portal</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>

    <link rel="shortcut icon" href="notes.png" type="image/x-icon">

    <!-- Global CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Schedule CSS -->
    <link rel="stylesheet" href="schedule.css">

</head>

<body>

<div class="container py-4">

    <!-- ========================= -->
    <!-- Top Bar -->
    <!-- ========================= -->

    <header class="topbar fade-in-up">

        <div class="brand-title">

            <span class="brand-dot"></span>

            <span>Daily Notes</span>

            <span class="brand-name">Portal</span>

        </div>

        <button
            id="back-btn"
            class="btn-ghost">

            <i class="ph ph-arrow-left"></i>

            Back

        </button>

    </header>

    <!-- ========================= -->
    <!-- Page Heading -->
    <!-- ========================= -->

    <section class="schedule-header fade-in-up">

        <h1>

            Today's
            <span class="gradient-text">
                Schedule
            </span>

        </h1>

        <p id="today-date">

            Thursday • 10 July 2026

        </p>

    </section>

    <!-- ========================= -->
    <!-- Status Card -->
    <!-- ========================= -->

    <section
        id="status-card"
        class="schedule-status-card glass-panel">

        <div id="status-icon">

            <div class="live-indicator">
    <span class="live-dot"></span>
    LIVE
</div>

        </div>

        <h2 id="status-title">

            Current Class

        </h2>

        <h3 id="status-subtitle">

            Machine Learning

        </h3>

        <p id="status-info">

            CLAB1 • SMC

        </p>

        <p id="status-time">

            Ends in 27 mins

        </p>

    </section>

    <!-- ========================= -->
    <!-- Today's Classes -->
    <!-- ========================= -->

    <section class="schedule-section">

        <h2>

            Today's Classes

        </h2>

        <div
            id="schedule-list">

            <!-- JavaScript will generate cards here -->

        </div>

    </section>

</div>

<footer
    class="text-center mt-5 mb-3"
    style="color: var(--text-muted); font-size: 0.85rem; margin-top: 2rem;"
>

    &copy; Daily Notes Portal v2.1

    <br><br>

    Designed & Developed by

    Debottam Chatterjee

    <br>

    St. Xavier's College (Autonomous), Kolkata

</footer>

<script src="js/timetable.js"></script>

<script src="js/schedule.js"></script>

</body>

</html>
