<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Notes Portal — Login</title>

    <meta
        name="description"
        content="Sign in with your Roll Number and Course to access daily class notes."
    >

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet"
    >

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="shortcut icon" href="notes.png" type="image/x-icon">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!--Schedule Site-->
    <div class="top-actions">

    <a
        href="schedule.html"
        class="btn-ghost">

        <i class="ph ph-calendar"></i>

        Today's Schedule

    </a>

</div>
    
<div class="login-shell">

    <section
        class="glass-panel login-card fade-in-up"
        data-testid="login-card"
    >

        <div class="brand-title mb-4" data-testid="brand-title">
            <span class="brand-dot"></span>
            <span>Daily Notes</span>
            <span class="brand-name">Portal</span>
        </div>

        <h1 class="login-title" data-testid="login-heading">
            Welcome <span class="gradient-text">back.</span>
        </h1>

        <p class="login-subtitle" data-testid="login-subheading">
            Enter your credentials to access today's class notes.
        </p>

        <form
            id="login-form"
            novalidate
            data-testid="login-form"
        >

            <div class="mb-3">

                <label
                    for="roll"
                    class="form-label-dark d-block"
                >
                    Roll Number
                </label>

                <input
                    id="roll"
                    name="roll"
                    type="text"
                    maxlength="3"
                    minlength="1"
                    inputmode="numeric"
                    pattern="[0-9]{1,3}"
                    class="form-control-dark"
                    placeholder="e.g. 501"
                    inputmode="numeric"
                    autocomplete="off"
                    required
                    data-testid="login-roll-input"
                >

            </div>

            <div class="mb-2">

                <label
                    for="course"
                    class="form-label-dark d-block"
                >
                    Course
                </label>

                <select
                    id="course"
                    name="course"
                    class="form-select-dark"
                    required
                    data-testid="login-course-select"
                >

                    <option value="" selected disabled>
                        Select course
                    </option>

                    <option value="UG">
                        UG — Undergraduate
                    </option>

                    <option value="PG">
                        PG — Postgraduate
                    </option>

                </select>

            </div>

            <div
                id="login-error"
                class="form-error"
                role="alert"
                aria-live="polite"
                data-testid="login-error"
            ></div>

            <button
                type="submit"
                id="login-submit"
                class="btn btn-primary-glow w-100 mt-3"
                aria-describedby="login-error"
                aria-label="Sign in to Daily Notes Portal"
                data-testid="login-submit-button"
            >
                <span id="login-submit-label">
                    Sign in
                </span>
            </button>

        </form>

        <p
            class="text-center mt-4 mb-0"
            style="color: var(--text-muted); font-size: 0.85rem;"
        >
            No password required. Access is granted via Roll Number &amp; Course.
        </p>

    </section>

</div>

<!-- Configuration -->
<script src="/js/config.js"></script>

<!-- Login Logic -->
<script src="/js/login.js"></script>

<footer
    class="text-center mt-5 mb-3"
    style="color: var(--text-muted); font-size: 0.85rem;">
    &copy; Daily Notes Portal v1.0 <br>

Designed & Developed by
Debottam Chatterjee<br>

St. Xavier's College (Autonomous), Kolkata

</footer>
    
</body>
</html>
