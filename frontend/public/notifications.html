<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Latest Notices | Daily Notes Portal</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>

    <link rel="shortcut icon" href="notes.png" type="image/x-icon">

    <!-- Global CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Notification CSS -->
    <link rel="stylesheet" href="notifications.css">

</head>

<body>

<div class="container py-4">

    <!-- ========================================================= -->
    <!-- Top Bar -->
    <!-- ========================================================= -->

    <header class="topbar fade-in-up">

        <div class="brand-title">

            <span class="brand-dot"></span>

            <span>Daily Notes</span>

            <span class="brand-name">Portal</span>

        </div>

        <button
            id="back-btn"
            class="btn-ghost">

            <i class="ph ph-arrow-left"></i>

            Back

        </button>

    </header>

    <!-- ========================================================= -->
    <!-- Page Heading -->
    <!-- ========================================================= -->

    <section class="notifications-header fade-in-up">

        <h1>

            Latest

            <span class="gradient-text">

                Notices

            </span>

        </h1>

        <p id="today-date">

            Friday • 11 July 2026

        </p>

    </section>

    <!-- ========================================================= -->
    <!-- Notices -->
    <!-- ========================================================= -->

    <section class="notifications-section">

        <div id="notifications-list">

            <!-- JavaScript will generate notice cards here -->

        </div>

    </section>

</div>

<footer
    class="text-center mt-5 mb-3"
    style="color: var(--text-muted); font-size: 0.85rem; margin-top: 2rem;"
>

    &copy; Daily Notes Portal v2.1

    <br><br>

    Designed & Developed by

    <br>

    Debottam Chatterjee

    <br>

    St. Xavier's College (Autonomous), Kolkata

</footer>

<script src="js/notifications.js"></script>

</body>

</html>
